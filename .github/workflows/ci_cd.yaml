name: CI & CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  CI:
    env:
      VENV_DIR: ".venv"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Creating Python Virtual Environment
        run: python3 -m venv "$VENV_DIR"
      - name: Activating Virtual Environment
        run: source "$VENV_DIR/bin/activate"
      - name: Installing Dependencies
        run: pip install --no-cache-dir -r requirements.txt
      - name: Running unit tests
        run: pytest

  CD:
    needs: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checking out repo
        uses: actions/checkout@v4
      - name: Authenticating on Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PAT }}
      - name: Configuring QEMU
        uses: docker/setup-qemu-action@v4
      - name: Configuring Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build e push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKER_HUB_USERNAME }}/vinicius-eduardo-taborda-costa:02-07-26